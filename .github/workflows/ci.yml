name: CI

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  lint:
    name: Flake8 Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install linting dependencies
        run: pip install flake8 flake8-quotes

      - name: Run flake8
        run: flake8 .